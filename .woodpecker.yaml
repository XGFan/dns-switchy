when:
  branch: master
  event: push

steps:
  - name: test
    image: golang:1.26-alpine
    commands:
      - go vet ./...
      - go test -timeout 3m ./...

  - name: build-ipk
    image: golang:1.26-alpine
    commands:
      - apk add --no-cache tar fakeroot gzip bash git python3
      - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-8)
      - bash scripts/build-openwrt-ipk.sh --version "v0.0.0-$SHORT_SHA" --arch x86_64
      - ls -lh dist/ipk/*/artifacts/*.ipk

  - name: deploy
    image: alpine
    commands:
      - apk add --no-cache openssh-client
      - mkdir -p ~/.ssh
      - echo "$CI_SSH_KEY" > ~/.ssh/deploy_key
      - chmod 600 ~/.ssh/deploy_key
      - ssh-keyscan -H "$OPENWRT_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
      - scp $SSH_OPTS dist/ipk/*/artifacts/*.ipk "$OPENWRT_USER@$OPENWRT_HOST:/tmp/"
      - |
        ssh $SSH_OPTS "$OPENWRT_USER@$OPENWRT_HOST" \
          'opkg install /tmp/dns-switchy_*.ipk && opkg install /tmp/luci-app-dns-switchy_*.ipk && /etc/init.d/dns-switchy restart && sleep 2 && pidof dns-switchy > /dev/null && echo "Service running" || (echo "Service failed to start" && exit 1) && rm -f /tmp/*.ipk'
      - rm -f ~/.ssh/deploy_key
    environment:
      CI_SSH_KEY:
        from_secret: ci_ssh_key
      OPENWRT_HOST:
        from_secret: openwrt_host
      OPENWRT_USER:
        from_secret: openwrt_user

  - name: notify-success
    image: docker.test4x.com/xgfan/plugin-bark
    failure: ignore
    settings:
      token:
        from_secret: bark_token
      status: success

  - name: notify-failure
    image: docker.test4x.com/xgfan/plugin-bark
    failure: ignore
    settings:
      token:
        from_secret: bark_token
      status: failure
    when:
      - status: [failure]
