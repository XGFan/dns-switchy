name: CI

on:
  push:
    branches: [master]
    paths-ignore: ["**.md", LICENSE, .claude/**, .omc/**, .gitignore]
  pull_request:
    branches: [master]
    paths-ignore: ["**.md", LICENSE, .claude/**, .omc/**, .gitignore]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -timeout 3m ./...

  build:
    needs: [test]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build OpenWrt IPKs (x86_64)
        run: |
          version="v0.0.0-$(git rev-parse --short HEAD)"
          echo "Building version: ${version}"
          scripts/build-openwrt-ipk.sh --arch x86_64 --version "${version}"
      - name: Stage artifacts
        run: |
          mkdir -p ipk-out
          cp dist/ipk/*/artifacts/*.ipk ipk-out/
          ls -la ipk-out/
      - uses: actions/upload-artifact@v7
        with:
          name: dns-switchy-ipk
          path: ipk-out/*.ipk

  notification:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always() && github.ref == 'refs/heads/master'
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.build.result }}" == "success" ]]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi
      - uses: shink/bark-action@v3
        if: env.BARK_TOKEN != ''
        env:
          BARK_TOKEN: ${{ secrets.BARK_TOKEN }}
        with:
          key: ${{ secrets.BARK_TOKEN }}
          title: "${{ github.repository }} CI ${{ steps.status.outputs.result }}"
          body: "${{ github.ref_name }}"
