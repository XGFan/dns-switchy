name: CI

on:
  push:
    branches: [master]
    paths-ignore: ["**.md", LICENSE]
  pull_request:
    paths-ignore: ["**.md", LICENSE]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
      - run: go vet ./...
      - run: go test -timeout 3m ./...

  build:
    needs: [test]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: go build -o dns-switchy
      - name: UPX compress
        uses: crazy-max/ghaction-upx@v4
        with:
          version: latest
          files: dns-switchy
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: dns-switchy
          path: dns-switchy

  notification:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always() && github.ref == 'refs/heads/master'
    steps:
      - name: Determine status
        id: status
        run: |
          FAILED=false
          for result in "${{ needs.test.result }}" "${{ needs.build.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              FAILED=true
            fi
          done
          if [ "$FAILED" = "true" ]; then echo "result=failure" >> "$GITHUB_OUTPUT"; else echo "result=success" >> "$GITHUB_OUTPUT"; fi
      - uses: shink/bark-action@v3
        if: env.BARK_TOKEN != ''
        env:
          BARK_TOKEN: ${{ secrets.BARK_TOKEN }}
        with:
          key: ${{ secrets.BARK_TOKEN }}
          title: "${{ github.repository }} CI ${{ steps.status.outputs.result }}"
          body: "${{ github.ref_name }}"
