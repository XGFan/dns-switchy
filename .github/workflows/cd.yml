name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "CI workflow run ID to deploy"
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: dns-switchy
          path: .
          run-id: ${{ github.event.workflow_run.id || inputs.run_id }}
          github-token: ${{ github.token }}

      - name: Deploy to OpenWrt
        env:
          SSH_KEY: ${{ secrets.CI_SSH_KEY }}
          SSH_HOST: ${{ secrets.OPENWRT_HOST }}
          SSH_USER: ${{ secrets.OPENWRT_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"

          chmod +x dns-switchy
          scp ${SSH_OPTS} dns-switchy "${SSH_USER}@${SSH_HOST}:/tmp/"
          ssh ${SSH_OPTS} "${SSH_USER}@${SSH_HOST}" 'mv /tmp/dns-switchy /mnt/ext/app/dns-switchy/dns-switchy && /etc/init.d/dns-switchy restart'

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Send Bark notification
        if: always() && env.BARK_TOKEN != ''
        uses: shink/bark-action@v3
        env:
          BARK_TOKEN: ${{ secrets.BARK_TOKEN }}
        with:
          key: ${{ secrets.BARK_TOKEN }}
          title: "${{ github.repository }} CD ${{ job.status }}"
          body: "${{ github.event.workflow_run.head_sha || github.sha }}"
