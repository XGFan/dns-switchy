addr: ":1053" #监听端口，目前只支持UDP
ttl: 5m #全局缓存时间
#nftset_table: "inet fw4" #可选，nftset 写入的目标表/族，默认 inet fw4
resolvers:
  - type: filter #过滤器 ，只针对类型
    queryType:
      - TXT
  - type: filter #过滤器 ，只针对域名，和forward规则一致
    rule:
      - ad.google.com
  - type: filter #过滤器 ，域名和类型，AND的关系
    queryType:
      - A
    rule:
      - wechat.com
  - type: file #文件解析
    fileType: lease #dnsmasq租约文件
    location: /tmp/dhcp.leases
    refreshInterval: 10m #刷新时间
    extraConfig:
      domain: lan #dhcp的search domain
  - type: file #host文件
    fileType: host
    location: system #可以是路径，如果是system，就按照系统的hosts文件来读取
    refreshInterval: 10m
    extraContent: |
      #语法和host一致
      1.1.1.1 a.com b.com
      2.2.2.2 c.com
      ::1 d.com
  # nftset 示例：命中该 resolver 解析出的 A 记录写进 nftables 集合 corp4（带 timeout），
  # 路由器侧据此做策略路由。仅配了 nftset 的 resolver 才写集合；本期仅 IPv4。详见 USAGE.md。
  #- name: corp-dns
  #  type: forward
  #  ttl: 600s
  #  url: 192.168.168.21
  #  rule:
  #    - corp.example #corp 域名后缀
  #  nftset: corp4 #A 答案写进 inet fw4 的 corp4 集合
  #  nftset_ttl: 1h #集合元素 timeout，须 ≥ 上面的 ttl(600s)
  - name: cn-dns
    type: forward
    ttl: 600s #缓存时间10分钟
    url: 114.114.114.114 #udp可以省略端口
    rule: #规则都是按域来的，a.com就覆盖了1.a.com，当规则存在时，只用该resolver处理符合规则的请求
      - cn
      - qq.com
      - baidu.com
      - v2fly:cn #v2fly domain-list-community cn 列表
  - name: cf-dns
    type: forward
    # 不设置缓存时间，采用全局ttl，实际就是5分钟
    # ttl: 600s
    url: https://cloudflare-dns.com/dns-query #doh
    config:
      timeout: 3s #超时时间
      serverIP:
        - 104.16.249.249 #可选的，方便bootstrap
  - name: final-dns
    type: forward
    ttl: -1s #由于返回可能被污染，所以不缓存（只有cf-dns无法解析，才会落到这里
    url: 114.114.114.114
